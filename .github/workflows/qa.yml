name: QA

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --prefer-offline
      - run: npm run codegen
      - run: npm run lint
      - run: npm run typecheck
