name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  PROJECT_NO: ${{ vars.GCP_PROJECT_NO }}
  SERVICE: tricktionary-api
  REGION: us-central1

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: projects/${{ vars.GCP_PROJECT_NO }}/locations/global/workloadIdentityPools/github/providers/github
        service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
        project_id: ${{ vars.GCP_PROJECT_ID }}

    # Setup gcloud CLI
    - uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ vars.GCP_PROJECT_ID }}

    # Configure Docker to use the gcloud command-line tool as a credential
    # helper for authentication
    - name: Authorize Docker push
      run: gcloud auth configure-docker us-central1-docker.pkg.dev 

    # Build the Docker image
    - name: Build
      run: |-
        docker build \
          --tag "$REGION-docker.pkg.dev/$PROJECT_NO/$SERVICE/$SERVICE:$GITHUB_SHA" \
          --build-arg GITHUB_SHA="$GITHUB_SHA" \
          --build-arg GITHUB_REF="$GITHUB_REF" \
          .

    # Push the Docker image to Google Container Registry
    - name: Publish
      run: |-
        docker push "$REGION-docker.pkg.dev/$PROJECT_NO/$SERVICE/$SERVICE:$GITHUB_SHA"

    - name: Deploy to Cloud Run
      id: deploy
      uses: google-github-actions/deploy-cloudrun@v3
      with:
        service: ${{ env.SERVICE }}
        image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_NO }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}
        region: ${{ env.REGION }}
        env_vars: SENTRY_DSN=${{ secrets.SENTRY_DSN }},GCP_PROJECT=${{ vars.GCP_PROJECT_ID }},ALGOLIA_APP_ID=${{ secrets.ALGOLIA_APP_ID }},ALGOLIA_API_KEY=${{ secrets.ALGOLIA_API_KEY }}
        secrets: STRIPE_SK=${{ secrets.STRIPE_SK_SECRET }}
        flags: --max-instances=default --service-account=${{ vars.GCP_RUN_SERVICE_ACCOUNT }}

    - name: Show Output
      run: echo ${{ steps.deploy.outputs.url }}

  sentry-release:
    name: Create Sentry release
    runs-on: ubuntu-latest
    environment: production
    needs: setup-build-publish-deploy

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Use Node.js 20
      uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: npm
    - run: npm ci --prefer-offline
    - run: npm run codegen
    - run: npm run build

    - name: Create Sentry release
      uses: getsentry/action-release@v3
      env:
        SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
        SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      with:
        environment: production
        sourcemaps: ./dist
        version_prefix: tricktionary-api@
